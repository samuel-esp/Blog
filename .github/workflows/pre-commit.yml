name: Pre-commit Lint Checks

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: "package.json"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit

      - name: Install dependencies
        run: |
          npm install    

      - name: Make temp pre-commit config
        run: |
          cp .pre-commit-config.yaml /tmp/pre-commit-config.yaml
          yq -i '.fail_fast = false' /tmp/pre-commit-config.yaml

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: "--all-files --config /tmp/pre-commit-config.yaml"
        env:
          SKIP: "no-commit-to-branch"

